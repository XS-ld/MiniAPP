<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的资源站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #FFFFFF;
            color: #000000;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        h2 {
            font-size: 20px;
            font-weight: 500;
            margin: 25px 0 15px 0;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
        }
        .button {
            display: inline-block;
            background-color: #FFFFFF;
            color: #000000;
            border: 2px solid #000000;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            width: 100%;
            margin-bottom: 15px;
        }
        .button:active {
            background-color: #000000;
            color: #FFFFFF;
        }
        .button.small {
            padding: 8px 16px;
            font-size: 14px;
            width: auto;
            margin-right: 10px;
        }
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 30px 20px;
            text-align: center;
            margin: 20px 0;
        }
        .file-list {
            list-style: none;
            margin-top: 15px;
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .file-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }
        .file-size {
            font-size: 12px;
            color: #666;
        }
        .status-message {
            margin: 15px 0;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        .status-message.success {
            background-color: #f0f0f0;
            color: #000;
            border: 1px solid #000;
            display: block;
        }
        .status-message.error {
            background-color: #f0f0f0;
            color: red;
            border: 1px solid red;
            display: block;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📁 资源站</h1>
    <div id="statusMessage" class="status-message"></div>
    <h2>上传资源</h2>
    <div class="upload-area" id="uploadArea">
        <p style="margin-bottom: 15px;">点击选择文件上传</p>
        <input type="file" id="fileInput" style="display:none">
        <button class="button" id="selectFileBtn">选择文件</button>
    </div>
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>资源列表</h2>
        <button class="button small" id="refreshBtn">↻ 刷新</button>
    </div>
    <div id="fileListContainer">
        <p style="text-align:center; color:#999; padding:30px 0;">暂无文件，请上传</p>
    </div>
</div>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const statusDiv = document.getElementById('statusMessage');
    const fileInput = document.getElementById('fileInput');
    const selectBtn = document.getElementById('selectFileBtn');
    const refreshBtn = document.getElementById('refreshBtn');
    const fileListDiv = document.getElementById('fileListContainer');

    let filesDB = [];

    function loadFromStorage() {
        const stored = localStorage.getItem('resource_files');
        if(stored) {
            try { filesDB = JSON.parse(stored); } catch(e){ filesDB = []; }
        } else { filesDB = []; }
    }
    function saveToStorage() {
        localStorage.setItem('resource_files', JSON.stringify(filesDB));
    }
    function formatSize(bytes) {
        if(bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B','KB','MB','GB'];
        const i = Math.floor(Math.log(bytes)/Math.log(k));
        return parseFloat((bytes/Math.pow(k,i)).toFixed(2)) + ' ' + sizes[i];
    }
    function showStatus(msg, type) {
        statusDiv.textContent = msg;
        statusDiv.className = 'status-message ' + type;
        setTimeout(() => { statusDiv.style.display = 'none'; }, 3000);
    }
    function renderList() {
        loadFromStorage();
        if(filesDB.length === 0) {
            fileListDiv.innerHTML = '<p style="text-align:center; color:#999; padding:30px 0;">暂无文件，请上传</p>';
            return;
        }
        let html = '<ul class="file-list">';
        const sorted = [...filesDB].sort((a,b)=>b.timestamp - a.timestamp);
        for(let f of sorted) {
            html += `
                <li class="file-item">
                    <div>
                        <div class="file-name">${escapeHtml(f.name)}</div>
                        <div class="file-size">${formatSize(f.size)}</div>
                    </div>
                    <div>
                        <button class="button small" data-id="${f.id}" data-action="download">下载</button>
                        <button class="button small" data-id="${f.id}" data-action="delete" style="border-color:red; color:red;">删除</button>
                    </div>
                </li>
            `;
        }
        html += '</ul>';
        fileListDiv.innerHTML = html;
        document.querySelectorAll('[data-action="download"]').forEach(btn => {
            btn.addEventListener('click', (e) => { downloadFile(btn.getAttribute('data-id')); });
        });
        document.querySelectorAll('[data-action="delete"]').forEach(btn => {
            btn.addEventListener('click', (e) => { deleteFile(btn.getAttribute('data-id')); });
        });
    }
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    function uploadFile(file) {
        if(!file) return;
        showStatus('上传中...', 'success');
        const reader = new FileReader();
        reader.onload = function(e) {
            const fileId = Date.now() + '_' + Math.random().toString(36).substr(2, 8);
            const record = {
                id: fileId,
                name: file.name,
                size: file.size,
                type: file.type,
                timestamp: Date.now(),
                dataUrl: e.target.result
            };
            loadFromStorage();
            filesDB.push(record);
            saveToStorage();
            renderList();
            showStatus('上传成功', 'success');
            fileInput.value = '';
        };
        reader.onerror = () => showStatus('读取文件失败', 'error');
        reader.readAsDataURL(file);
    }
    function downloadFile(id) {
        loadFromStorage();
        const file = filesDB.find(f => f.id === id);
        if(!file) { showStatus('文件不存在', 'error'); return; }
        const a = document.createElement('a');
        a.href = file.dataUrl;
        a.download = file.name;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        showStatus('下载已开始', 'success');
    }
    function deleteFile(id) {
        if(!confirm('确定删除吗？')) return;
        loadFromStorage();
        const idx = filesDB.findIndex(f => f.id === id);
        if(idx !== -1) {
            filesDB.splice(idx,1);
            saveToStorage();
            renderList();
            showStatus('已删除', 'success');
        } else {
            showStatus('文件不存在', 'error');
        }
    }
    selectBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => { if(e.target.files[0]) uploadFile(e.target.files[0]); });
    refreshBtn.addEventListener('click', () => { renderList(); showStatus('刷新成功', 'success'); });
    renderList();
</script>
</body>
</html>
